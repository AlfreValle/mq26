name: CI/CD MQ26
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q --tb=short --no-cov
        env:
          MQ26_PASSWORD: test_password_123

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach
        continue-on-error: true

      - name: Smoke post-deploy
        env:
          MQ26_PASSWORD: test_password_123
        run: |
          sleep 30
          BASE="${{ secrets.RAILWAY_URL }}"
          if [ -z "$BASE" ]; then BASE="http://127.0.0.1:8502"; fi
          python scripts/smoke_produccion.py --base-url "$BASE"
        continue-on-error: true
