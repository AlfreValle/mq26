name: CI/CD MQ26
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q --tb=short --no-cov
        env:
          MQ26_PASSWORD: test_password_123
  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Sin RAILWAY_TOKEN el job se omite (forks / repos que aún no configuraron deploy).
    if: github.ref == 'refs/heads/main' && secrets.RAILWAY_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service mq26
