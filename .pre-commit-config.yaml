# Instalación: pip install -e ".[dev]" && pre-commit install
# Ejecutar en todo el repo: pre-commit run --all-files
# Alineado a pyproject.toml ([tool.ruff], [tool.black])
default_language_version:
  python: python3.12

exclude: '^(\.claude/|0_Data_Maestra/|htmlcov/|assets/)'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
