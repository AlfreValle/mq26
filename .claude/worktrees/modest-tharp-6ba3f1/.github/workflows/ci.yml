name: CI/CD MQ26
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff + Black (Fase D — endurecer a blocking cuando el repo esté limpio)
        run: |
          pip install ruff black
          ruff check core services ui tests scripts
          black --check core services ui tests run_mq26.py app_main.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Pytest suite (paridad P3-QA-01 — ver docs/product/CHECKLIST_P3_QA01_RELEASE.md)
        run: pytest tests/ -q --tb=short --no-cov
        env:
          MQ26_PASSWORD: test_password_123

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      - name: Smoke post-deploy
        env:
          MQ26_PASSWORD: test_password_123
        run: |
          sleep 30
          BASE="${{ secrets.RAILWAY_URL }}"
          if [ -z "$BASE" ]; then
            echo "RAILWAY_URL secret is required for smoke post-deploy"
            exit 1
          fi
          python scripts/smoke_produccion.py --base-url "$BASE"
